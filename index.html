<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Generate beautiful typographic wallpapers from curated quotes. Choose vibe, font, layout — download as PNG." />
  <title>Plaintext — Typography Wallpapers</title>
  <!-- App shell font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app" id="app">

    <!-- ── Header ── -->
    <header class="header">
      <div class="header__left">
        <span class="header__title">Plaintext</span>
        <span class="header__dot">·</span>
        <span class="header__sub">Quote-driven typographic posters</span>
      </div>
      <div class="header__right">
        <div class="lang-toggle">
          <button id="lang-en" class="lang-btn lang-btn--active" type="button">EN</button>
          <button id="lang-es" class="lang-btn" type="button">ES</button>
        </div>
        <button id="btn-dark-mode" class="icon-btn" type="button" title="Toggle dark mode" aria-label="Toggle dark mode">
          <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
        </button>
        <button id="btn-zen" class="icon-btn" type="button" title="Zen mode (Z)" aria-label="Enter zen mode">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/></svg>
        </button>
        <button id="btn-kbd-hint" class="icon-btn" type="button" title="Keyboard shortcuts (?)" aria-label="Show keyboard shortcuts">?</button>
        <span class="header__version">v1.1</span>
      </div>
    </header>

    <!-- ── Sidebar ── -->
    <div class="zen-sensor" id="zen-sensor"></div>
    <aside class="sidebar" id="sidebar">

      <!-- Vibe filter -->
      <div class="control-group">
        <label class="label" id="label-vibe-filter">Vibe</label>
        <div class="vibe-filter" role="group" aria-labelledby="label-vibe-filter">
          <button id="vf-all"     class="vf-btn vf-btn--active" type="button" data-vibe="all">All</button>
          <button id="vf-calm"    class="vf-btn" type="button" data-vibe="calm">Calm</button>
          <button id="vf-serious" class="vf-btn" type="button" data-vibe="serious">Serious</button>
          <button id="vf-chaotic" class="vf-btn" type="button" data-vibe="chaotic">Chaotic</button>
        </div>
      </div>

      <div class="control-group">
        <label class="label" for="resolution-select">Resolution</label>
        <select id="resolution-select" class="select">
          <option value="desktop">Desktop — 1920 × 1080</option>
          <option value="mobile">Mobile — 1080 × 1920</option>
        </select>
      </div>

      <div class="control-group">
        <label class="label" for="font-select">Typeface</label>
        <select id="font-select" class="select">
          <!-- populated by JS -->
        </select>
      </div>

      <div class="control-group">
        <label class="label" for="layout-select">Layout</label>
        <select id="layout-select" class="select">
          <option value="editorial">Editorial — left-aligned</option>
          <option value="ruled">Ruled — centred grid</option>
          <option value="offset">Offset — asymmetric</option>
        </select>
      </div>

      <div class="control-group">
        <label class="label">Background</label>
        <div class="tabs">
          <button id="tab-solid" class="tab tab--active" type="button">Solid</button>
          <button id="tab-gradient" class="tab" type="button">Gradient</button>
        </div>
        <div id="solid-controls" class="tab-content tab-content--active">
          <select id="solid-select" class="select">
            <option value="white">Pure White</option>
            <option value="cream">Antique Cream</option>
            <option value="ivory">Warm Ivory</option>
            <option value="sand">Soft Sand</option>
            <option value="clay">Grey Clay</option>
            <option value="slate">Cool Slate</option>
            <option value="charcoal">Deep Charcoal</option>
            <option value="black">Pure Black</option>
          </select>
        </div>
        <div id="gradient-controls" class="tab-content">
          <select id="gradient-select" class="select">
            <option value="auto">Auto — by Vibe</option>
            <option value="vibrant">Vibrant — colors</option>
            <option value="calm">Calm — subtle</option>
            <option value="chaotic">Chaotic — intense</option>
            <option value="serious">Serious — dark</option>
          </select>
        </div>
      </div>

      <div class="control-group">
        <label class="label" for="ink-select">Ink</label>
        <select id="ink-select" class="select">
          <option value="auto">Auto — Contrast</option>
          <option value="dark">Charcoal Black</option>
          <option value="deep">Pure Black</option>
          <option value="light">Ghost White</option>
          <option value="muted">Steel Grey</option>
        </select>
      </div>

      <!-- Custom quote -->
      <div class="control-group">
        <label class="label" for="custom-quote">Custom Quote</label>
        <textarea id="custom-quote" class="textarea" rows="3" placeholder="Type your own quote…" spellcheck="false"></textarea>
        <input id="custom-author" class="input" type="text" placeholder="Author (optional)" />
      </div>

      <div class="btn-group">
        <button id="btn-generate" class="btn btn--primary" title="New Quote (Space)" type="button">Next Quote</button>
        <button id="btn-shuffle" class="btn" title="Randomize Style (S)" type="button">Shuffle</button>
        <button id="btn-download" class="btn" title="Download (D)" type="button">Download</button>
      </div>

      <div class="divider"></div>

      <div class="meta">
        <div class="meta__row">
          <span class="label">Vibe</span>
          <span id="vibe-indicator" class="vibe-pill" data-vibe="">—</span>
        </div>
        <div class="meta__row">
          <span class="label">Layout</span>
          <span id="layout-current" class="meta__value">—</span>
        </div>
      </div>

      <blockquote class="quote-card" id="quote-card" aria-live="polite" title="Click to copy" tabindex="0" role="button">
        <p id="quote-preview" class="quote-card__text">Press Generate to create a wallpaper.</p>
        <footer id="author-preview" class="quote-card__author"></footer>
        <span class="quote-card__copy-hint" id="copy-hint" aria-hidden="true">Copied</span>
      </blockquote>

      <p class="sidebar__footer" id="sidebar-footer">— quotes · 3 vibes · 10 typefaces</p>

    </aside>

    <!-- ── Canvas ── -->
    <main class="canvas-area" id="canvas-area">
      <div id="canvas-wrapper">
        <canvas id="canvas" role="img" aria-label="Generated wallpaper preview"></canvas>
      </div>
    </main>

    <!-- ── Keyboard shortcuts panel ── -->
    <div class="kbd-panel" id="kbd-panel" aria-hidden="true">
      <div class="kbd-panel__inner">
        <p class="kbd-panel__title">Shortcuts</p>
        <div class="kbd-panel__row"><kbd>Space</kbd><span>Next Quote</span></div>
        <div class="kbd-panel__row"><kbd>S</kbd><span>Shuffle style</span></div>
        <div class="kbd-panel__row"><kbd>D</kbd><span>Download</span></div>
        <div class="kbd-panel__row"><kbd>1</kbd><span>Editorial layout</span></div>
        <div class="kbd-panel__row"><kbd>2</kbd><span>Ruled layout</span></div>
        <div class="kbd-panel__row"><kbd>3</kbd><span>Offset layout</span></div>
        <div class="kbd-panel__row"><kbd>Z</kbd><span>Zen mode</span></div>
        <div class="kbd-panel__row"><kbd>Esc</kbd><span>Exit zen / close</span></div>
      </div>
    </div>

  </div>
  <script type="module" src="main.js"></script>
</body>
</html>
